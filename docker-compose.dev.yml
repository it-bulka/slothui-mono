services:
  redis:
    ports: []
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: ./back/Dockerfile.dev
    container_name: backend-slothui-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    env_file:
      - ./back/.env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    volumes:
      - ./back/src:/app/back/src
      - ./back/test:/app/back/test
      - /app/node_modules
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
