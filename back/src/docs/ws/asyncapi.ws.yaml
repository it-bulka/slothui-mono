asyncapi: '2.6.0'
info:
  title: SlothUI WebSocket API
  version: 1.0.0
  description: >
    Documentation of all SlothUI WebSocket events over Socket.io.

    **Connection:** `ws://localhost:3000/ws`

    **Authentication:** Pass the JWT access token in `socket.handshake.auth.token`.

    **Room model:**
    - Each user automatically joins a personal room `user:{userId}` on connect.
    - Each user joins all their chat rooms `chat:{chatId}` on connect.

    **Direction convention:**
    - `subscribe` = Client → Server (client emits, server handles)
    - `publish`   = Server → Client (server emits, client listens)

servers:
  dev:
    url: ws://localhost:3000
    protocol: ws
    description: Local development server

channels:
  # ─── CHAT — Client → Server ──────────────────────────────────────────────

  'chat:create':
    subscribe:
      summary: Create a new chat (private or group)
      description: >
        Client requests chat creation. Server responds with
        [`chat:created`](#channel-chat:created) to all members.
        On error emits [`ErrorAcknowledge`](#message-ErrorAcknowledge).
      message:
        $ref: '#/components/messages/CreateChat'

  'chat:delete':
    subscribe:
      summary: Delete a chat (owner only)
      description: >
        Client requests chat deletion. Server broadcasts
        [`chat:deleted`](#channel-chat:deleted) to all members.
      message:
        payload:
          type: object
          required: [chatId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'

  'chat:join':
    subscribe:
      summary: Join a public group chat
      description: >
        Client joins a public chat. Server broadcasts
        [`chat:newMember`](#channel-chat:newMember) to the room.
      message:
        payload:
          type: object
          required: [chatId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'

  'chat:leave':
    subscribe:
      summary: Leave a chat
      description: >
        Client leaves a chat voluntarily. Server broadcasts
        [`chat:left`](#channel-chat:left) to the room.
      message:
        payload:
          type: object
          required: [chatId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'

  'chat:removeMemberRequest':
    subscribe:
      summary: Remove a member from a chat (owner only)
      description: >
        Owner removes another member. Server broadcasts
        [`chat:memberRemoved`](#channel-chat:memberRemoved) to the room
        and [`chat:removedFromChat`](#channel-chat:removedFromChat) to the
        removed user's socket.
      message:
        payload:
          type: object
          required: [chatId, memberId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'
            memberId:
              $ref: '#/components/schemas/UUID'

  'chat:enter':
    subscribe:
      summary: Mark a chat as currently open (used for unread sync)
      description: >
        Client informs the server that the user has opened a specific chat.
        Server resets the unread counter and responds with
        [`chat:unread:sync`](#channel-chat:unread:sync).
      message:
        payload:
          type: object
          required: [chatId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'

  'msg:isTyping:client':
    subscribe:
      summary: Notify that the current user is typing
      description: >
        Client sends typing state. Server broadcasts
        [`msg:isTyping`](#channel-msg:isTyping) to the chat room.
      message:
        payload:
          type: object
          required: [chatId, isTyping]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'
            isTyping:
              type: boolean
              example: true

  # ─── CHAT — Server → Client ──────────────────────────────────────────────

  'chat:created':
    publish:
      summary: A new chat was created
      description: >
        Broadcast to all member sockets after a successful
        [`chat:create`](#channel-chat:create).
      message:
        $ref: '#/components/messages/Chat'

  'chat:deleted':
    publish:
      summary: A chat was deleted
      description: >
        Sent to each member's personal room (`user:{userId}`) after
        [`chat:delete`](#channel-chat:delete).
      message:
        payload:
          type: object
          required: [chatId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'

  'chat:newMember':
    publish:
      summary: A new member joined the chat
      description: >
        Broadcast to the chat room after [`chat:join`](#channel-chat:join).
      message:
        payload:
          type: object
          required: [chatId, newMember]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'
            newMember:
              $ref: '#/components/schemas/UserShort'

  'chat:left':
    publish:
      summary: A member left the chat voluntarily
      description: >
        Broadcast to the chat room after [`chat:leave`](#channel-chat:leave).
      message:
        payload:
          type: object
          required: [chatId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'

  'chat:removedFromChat':
    publish:
      summary: The current user was removed from a chat
      description: >
        Sent directly to the removed member's socket after
        [`chat:removeMemberRequest`](#channel-chat:removeMemberRequest).
      message:
        payload:
          type: object
          required: [chatId, memberId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'
            memberId:
              $ref: '#/components/schemas/UUID'

  'chat:memberRemoved':
    publish:
      summary: A member was removed from the chat by the owner
      description: >
        Broadcast to the chat room after
        [`chat:removeMemberRequest`](#channel-chat:removeMemberRequest).
      message:
        payload:
          type: object
          required: [chatId, memberId]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'
            memberId:
              $ref: '#/components/schemas/UUID'

  'chat:unread:sync':
    publish:
      summary: Unread counter reset for a chat the user just opened
      description: >
        Sent to the requesting client after
        [`chat:enter`](#channel-chat:enter).
      message:
        payload:
          type: object
          required: [chatId, unread]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'
            unread:
              type: integer
              example: 0

  'chat:unread:batch':
    publish:
      summary: Batched unread message counts across chats
      description: >
        Emitted every ~1000ms to the user's personal room (`user:{userId}`)
        when there are buffered unread messages. Clients use this to update
        badge counters without processing every individual message.
      message:
        $ref: '#/components/messages/UnreadBatch'

  # ─── MESSAGES — Server → Client ──────────────────────────────────────────

  'msg:new':
    publish:
      summary: A new message was sent in a chat
      description: >
        Broadcast to the chat room (`chat:{chatId}`) after a message is
        created via `POST /api/chats/:chatId/messages`. The payload is a
        union — additional fields appear depending on message type
        (attachments, poll, geo, post forward, story).
      message:
        $ref: '#/components/messages/ChatMessage'

  'msg:isTyping':
    publish:
      summary: A chat member typing state changed
      description: >
        Broadcast to the chat room in response to
        [`msg:isTyping:client`](#channel-msg:isTyping:client).
      message:
        payload:
          type: object
          required: [chatId, isTyping, user]
          properties:
            chatId:
              $ref: '#/components/schemas/UUID'
            isTyping:
              type: boolean
              example: true
            user:
              $ref: '#/components/schemas/UserShort'

  # ─── FOLLOWERS — Server → Client ─────────────────────────────────────────

  'follower:new':
    publish:
      summary: Someone started following the current user
      description: >
        Sent to the target user's personal room (`user:{userId}`)
        when a follow action is performed.
      message:
        payload:
          $ref: '#/components/schemas/NewFriendNotification'

  'followers:update':
    publish:
      summary: A follow relationship was removed
      description: >
        Sent to both users' personal rooms when an unfollow action occurs.
      message:
        payload:
          type: object
          required: [actorId, targetId, type]
          properties:
            actorId:
              $ref: '#/components/schemas/UUID'
            targetId:
              $ref: '#/components/schemas/UUID'
            type:
              type: string
              enum: [unfollow]
              example: unfollow

  # ─── NOTIFICATIONS — Server → Client ─────────────────────────────────────

  'friend:request':
    publish:
      summary: Someone sent a follow request to the current user
      description: >
        Sent to the target user's personal room. Contains the
        requesting user profile.
      message:
        payload:
          $ref: '#/components/schemas/UserResponse'

  'friend:confirmed':
    publish:
      summary: A follow request was accepted
      description: >
        Sent to the original requester's personal room when the target
        accepts the follow request.
      message:
        payload:
          $ref: '#/components/schemas/UserResponse'

  'notification:new':
    publish:
      summary: A new in-app notification
      description: >
        Sent to the recipient's personal room (`user:{userId}`) for
        likes, comments, system alerts, and other notification types.
        These are also persisted and retrievable via
        `GET /api/notifications`.
      message:
        $ref: '#/components/messages/Notification'

components:
  messages:
    ErrorAcknowledge:
      name: ErrorAcknowledge
      contentType: application/json
      summary: Error acknowledge
      payload:
        type: object
        required: [ok, message]
        properties:
          ok:
            type: boolean
            example: false
          message:
            type: string
            example: 'Forbidden'

    Chat:
      name: Chat
      title: Chat details
      contentType: application/json
      payload:
        $ref: '#/components/schemas/Chat'

    CreateChat:
      name: CreateChat
      contentType: application/json
      summary: Create chat request payload
      payload:
        type: object
        required: [members, type]
        properties:
          members:
            type: array
            items:
              $ref: '#/components/schemas/UUID'
            minItems: 2
            example: ['uuid-user-1', 'uuid-user-2']
          username:
            type: string
            nullable: true
            example: 'Dev Team'
          type:
            type: string
            enum: [private, group]
            example: group
          visibility:
            type: string
            enum: [private, public]
            nullable: true
            example: public

    ChatMessage:
      name: ChatMessage
      title: Chat message
      contentType: application/json
      summary: >
        Message payload — base fields always present, extra fields depend on type.
      payload:
        $ref: '#/components/schemas/Message'

    UnreadBatch:
      name: UnreadBatch
      title: Unread counts batch
      contentType: application/json
      payload:
        type: object
        required: [userId, items]
        properties:
          userId:
            $ref: '#/components/schemas/UUID'
          items:
            type: array
            items:
              $ref: '#/components/schemas/UnreadBatchItem'

    Notification:
      name: Notification
      title: In-app notification
      contentType: application/json
      payload:
        $ref: '#/components/schemas/NotificationResponse'

  schemas:
    UUID:
      type: string
      format: uuid
      example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'

    Chat:
      type: object
      required: [id, type, visibility, createdAt, updatedAt, memberIds, ownerId]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        type:
          type: string
          enum: [private, group]
          example: group
        visibility:
          type: string
          enum: [private, public]
          example: public
        name:
          type: string
          nullable: true
          example: 'Dev Team'
        createdAt:
          type: string
          format: date-time
          example: '2025-10-06T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-10-06T12:30:00Z'
        memberIds:
          type: array
          items:
            $ref: '#/components/schemas/UUID'
        ownerId:
          $ref: '#/components/schemas/UUID'
        members:
          type: array
          items:
            $ref: '#/components/schemas/UserShort'

    UserShort:
      type: object
      required: [id, username, nickname]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
          example: john_doe
        nickname:
          type: string
          example: John Doe
        avatarUrl:
          type: string
          nullable: true
          example: 'https://res.cloudinary.com/demo/image/upload/avatar.jpg'

    UserResponse:
      type: object
      required: [id, username, nickname, role, email]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
          example: john_doe
        nickname:
          type: string
          example: John Doe
        role:
          type: string
          enum: [user, admin]
          example: user
        avatarUrl:
          type: string
          nullable: true
          example: 'https://res.cloudinary.com/demo/image/upload/avatar.jpg'
        email:
          type: string
          example: john@example.com
        bio:
          type: string
          nullable: true
          example: 'Frontend developer'

    NewFriendNotification:
      type: object
      required: [id, username, nickname]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
          example: jane_smith
        nickname:
          type: string
          example: Jane Smith
        avatarUrl:
          type: string
          nullable: true
          example: 'https://res.cloudinary.com/demo/image/upload/avatar.jpg'

    Message:
      type: object
      required: [id, chatId, authorId, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        chatId:
          $ref: '#/components/schemas/UUID'
        text:
          type: string
          nullable: true
          example: 'Hello!'
        authorId:
          $ref: '#/components/schemas/UUID'
        createdAt:
          type: string
          format: date-time
          example: '2025-10-06T12:30:00Z'
        attachments:
          type: array
          description: Present when message has file attachments
          items:
            $ref: '#/components/schemas/Attachment'
        poll:
          description: Present when message contains a poll
          $ref: '#/components/schemas/PollResult'
        geo:
          description: Present when message contains a geo-location
          $ref: '#/components/schemas/GeoMessage'

    Attachment:
      type: object
      required: [id, url, order, type, metadata]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        url:
          type: string
          example: 'https://res.cloudinary.com/demo/image/upload/sample.jpg'
        order:
          type: integer
          example: 0
        type:
          type: string
          enum: [images, file, audio, video]
        metadata:
          type: object
          properties:
            size:
              type: integer
              example: 204800
            format:
              type: string
              example: jpg
            width:
              type: integer
              example: 1920
            height:
              type: integer
              example: 1080
            duration:
              type: number
              example: 30.5
            thumbnailUrl:
              type: string
              nullable: true
            waveform:
              type: array
              items:
                type: number

    PollResult:
      type: object
      required: [id, question, multiple, anonymous, answers, votesCount]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        question:
          type: string
          example: 'Favorite framework?'
        multiple:
          type: boolean
        anonymous:
          type: boolean
        answers:
          type: array
          items:
            type: object
            properties:
              id:
                $ref: '#/components/schemas/UUID'
              value:
                type: string
                example: React
              votes:
                type: integer
              percentage:
                type: number
        userVote:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/UUID'
        votesCount:
          type: integer
          example: 42

    GeoMessage:
      type: object
      required: [position, locationName]
      properties:
        position:
          type: array
          items:
            type: number
          example: [50.4501, 30.5234]
        locationName:
          type: string
          example: 'Kyiv, Independence Square'

    UnreadBatchItem:
      type: object
      required: [chatId, count]
      properties:
        chatId:
          $ref: '#/components/schemas/UUID'
        count:
          type: integer
          example: 3

    NotificationResponse:
      type: object
      required: [id, type, createdAt, read]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        type:
          type: string
          enum: [like, follow, comment, system]
          example: like
        createdAt:
          type: string
          format: date-time
          example: '2025-10-06T12:30:00Z'
        read:
          type: boolean
          example: false
        actor:
          $ref: '#/components/schemas/UserShort'
        entityId:
          type: string
          nullable: true
          example: 'uuid-post-1234'
        entityTitle:
          type: string
          nullable: true
          example: 'My first post'
        meta:
          type: object
          additionalProperties: true
